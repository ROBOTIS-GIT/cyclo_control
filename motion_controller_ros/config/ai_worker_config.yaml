ai_worker_controller:
  ros__parameters:
    control_frequency: 100.0
    time_step: 0.01
    trajectory_time: 0.0
    # kp_position: 50.0
    # kp_orientation: 50.0
    # weight_position: 10.0
    # weight_orientation: 1.0
    # weight_elbow_position: 0.5
    # weight_damping: 0.1
    kp_position: 100.0
    kp_orientation: 10.0
    weight_position: 1.0
